kind = "web"
previewPath = "/"
title = "BabyCare AI Assistant"
version = "1.0.0"
id = "artifacts/babycare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25932

[services.development]
run = "pnpm --filter @workspace/babycare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/babycare", "run", "build" ]
publicDir = "artifacts/babycare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25932"
BASE_PATH = "/"

[[services]]
name = "flask-api"
paths = [ "/api" ]
localPort = 5050

[services.development]
run = "python3 /home/runner/workspace/artifacts/flask-backend/app.py"

[services.env]
PORT = "5050"
